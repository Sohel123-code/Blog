services:
  - type: web
    name: events-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    port: 3000

  - type: web
    name: events-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: events-backend
          envVarKey: RENDER_EXTERNAL_URL
